name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-go:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Need the Angular dist for embed to work
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: cd web && npm ci && npx ng build --output-path ../internal/web/dist

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  lint-angular:
    name: Angular Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: cd web && npm ci

      - name: Lint
        run: cd web && npx ng lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-go, lint-angular]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: cd web && npm ci && npx ng build --output-path ../internal/web/dist

      - name: Build binary
        run: go build -o bin/opencode-manager ./cmd/opencode-manager

      - name: Vet
        run: go vet ./...

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: opencode-manager-linux-amd64
          path: bin/opencode-manager
