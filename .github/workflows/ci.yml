name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-go:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build frontend
        run: cd web && pnpm install --frozen-lockfile && pnpm ng build --output-path ../internal/web/dist

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  lint-frontend:
    name: Frontend Lint (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install
        run: cd web && pnpm install --frozen-lockfile

      - name: Biome check
        run: cd web && pnpm biome check src/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-go, lint-frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build frontend
        run: cd web && pnpm install --frozen-lockfile && pnpm ng build --output-path ../internal/web/dist

      - name: Build binary
        run: go build -o bin/opencode-manager ./cmd/opencode-manager

      - name: Vet
        run: go vet ./...

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: opencode-manager-linux-amd64
          path: bin/opencode-manager
