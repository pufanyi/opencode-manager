linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gosimple
    - gocritic
    - misspell
    - gofmt

linters-settings:
  errcheck:
    exclude-functions:
      - (net/http.ResponseWriter).Write
      - (*github.com/go-telegram/bot.Bot).DeleteMessage
  gocritic:
    disabled-checks:
      - ifElseChain

issues:
  exclude-dirs:
    - web
  max-issues-per-linter: 20
