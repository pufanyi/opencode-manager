<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>OpenCode Manager Login</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #f0f6fc; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 40px; max-width: 400px; width: 100%; text-align: center; }
  h1 { font-size: 22px; margin-bottom: 8px; }
  .sub { color: #8b949e; font-size: 14px; margin-bottom: 28px; }
  .btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 12px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; }
  .btn-google { background: #fff; color: #3c4043; border: 1px solid #dadce0; margin-bottom: 12px; }
  .btn-google:hover { background: #f7f8f8; }
  .divider { display: flex; align-items: center; margin: 16px 0; color: #484f58; font-size: 12px; }
  .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #30363d; }
  .divider span { padding: 0 12px; }
  input { width: 100%; padding: 10px 14px; margin-bottom: 10px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #f0f6fc; font-size: 14px; }
  input:focus { outline: none; border-color: #58a6ff; }
  .btn-email { background: #238636; color: #fff; }
  .btn-email:hover { background: #2ea043; }
  .btn-email:disabled { opacity: 0.6; cursor: default; }
  .success { color: #3fb950; font-size: 16px; }
  .error { color: #f85149; font-size: 14px; margin-top: 12px; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #login-form, #success-msg, #loading-msg { display: none; }
</style>
</head>
<body>
<div class="card">
  <h1>OpenCode Manager</h1>
  <p class="sub">Sign in to connect your Go server</p>

  <div id="login-form">
    <button class="btn btn-google" onclick="googleLogin()">
      <svg viewBox="0 0 24 24" width="18" height="18">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Sign in with Google
    </button>

    <div class="divider"><span>or</span></div>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button class="btn btn-email" onclick="emailLogin()">Sign in with Email</button>

    <div id="error-msg" class="error"></div>
  </div>

  <div id="loading-msg"><div class="spinner"></div><p style="margin-top:12px;color:#8b949e">Signing in...</p></div>
  <div id="success-msg"><p class="success">&#10003; Signed in successfully!</p><p style="margin-top:8px;color:#8b949e">You can close this window.</p></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js';
import { getAuth, signInWithPopup, signInWithEmailAndPassword, GoogleAuthProvider } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js';

const app = initializeApp({
  apiKey: '{{API_KEY}}',
  authDomain: '{{AUTH_DOMAIN}}',
  databaseURL: '{{DATABASE_URL}}',
  projectId: '{{PROJECT_ID}}',
});
const auth = getAuth(app);

document.getElementById('login-form').style.display = 'block';

window.googleLogin = async () => {
  showLoading();
  try {
    const result = await signInWithPopup(auth, new GoogleAuthProvider());
    await sendToken(result.user);
  } catch (e) {
    showError(e.message);
  }
};

window.emailLogin = async () => {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  if (!email || !password) return;
  showLoading();
  try {
    const result = await signInWithEmailAndPassword(auth, email, password);
    await sendToken(result.user);
  } catch (e) {
    showError(e.message);
  }
};

async function sendToken(user) {
  const idToken = await user.getIdToken();
  const res = await fetch('/callback', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      refresh_token: user.refreshToken,
      id_token: idToken,
      email: user.email,
      uid: user.uid,
    }),
  });
  if (res.ok) {
    document.getElementById('loading-msg').style.display = 'none';
    document.getElementById('success-msg').style.display = 'block';
  } else {
    showError('Failed to send token to CLI');
  }
}

function showLoading() {
  document.getElementById('login-form').style.display = 'none';
  document.getElementById('error-msg').textContent = '';
  document.getElementById('loading-msg').style.display = 'block';
}

function showError(msg) {
  document.getElementById('loading-msg').style.display = 'none';
  document.getElementById('login-form').style.display = 'block';
  document.getElementById('error-msg').textContent = msg;
}
</script>
</body>
</html>
